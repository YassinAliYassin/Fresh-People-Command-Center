version: '3.8'

services:
  flow:
    build: .
    ports:
      - "3001:3001"
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - ./data:/app/data
      - ./events.db:/app/events.db
    restart: unless-stopped

